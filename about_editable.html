
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>About the Developrs</title>

<style>
:root {
--bg:#f0f2f5;
--surface:#ffffff;
--surface2:#f7f8fa;
--border:#e4e7ec;
--accent:#0057ff;
--accent-light:#e8eeff;
--text:#0f1523;
--muted:#8a92a6;
--shadow:0 1px 3px rgba(0,0,0,0.07),0 4px 16px rgba(0,0,0,0.04);
}

body{
font-family:"Plus Jakarta Sans",Arial,sans-serif;
background:var(--bg);
color:var(--text);
margin:0;
}

.top-nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px 24px;
background:var(--surface);
border-bottom:1px solid var(--border);
box-shadow:var(--shadow);
}

.top-nav a{
color:var(--muted);
text-decoration:none;
margin-left:20px;
font-weight:600;
}

.top-nav a:hover{
color:var(--accent);
}

.container{
max-width:900px;
margin:auto;
padding:40px;
}

.card{
background:var(--surface);
border:1px solid var(--border);
box-shadow:var(--shadow);
padding:30px;
border-radius:14px;
margin-bottom:20px;
}

.edit-btn{
background:var(--accent);
border:none;
color:white;
padding:10px 16px;
border-radius:6px;
cursor:pointer;
margin-bottom:20px;
font-weight:600;
}

h1,h2{
color:var(--text);
}

p, li{
color:#2f3a4f;
}
</style>

</head>

<body>

<header class="top-nav">
<div>ABC Logistics</div>
<nav>
<a href="ABC_Logistics_dashboard.html">Dashboard</a>
<a href="about_editable.html">About Me</a>
</nav>
</header>

<div class="container">

<button class="edit-btn" onclick="toggleEdit()">Edit Page</button>

<div class="card" contenteditable="false">
<h1>About the Developrs</h1>
<p><strong>Name:</strong> Kian</p>
<p><strong>Role:</strong> Project Manager</p>
<p>Having extensive experience in creating websites, but works with multiple teams.</p>
<p>Additional consultation from Junior Developers Claude, ChatGPT, and Gemini.</p>
</div>

</div>

<script>
let editing=false;

function toggleEdit(){
 editing=!editing;
 document.querySelectorAll(".card").forEach(c=>{
   c.contentEditable = editing;
 });
}
</script>

</body>
</html>
